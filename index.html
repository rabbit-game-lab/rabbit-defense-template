<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Hidden Dojo Defense is a pixel-art ninja tower defense game template built with Phaser for Rabbit Game Lab." />
  <meta name="keywords" content="Rabbit Game Lab, Hidden Dojo Defense, tower defense, Phaser, 2D game template, pixel art, ninja game" />
  <meta name="author" content="Rabbit Game Lab" />
  <meta name="application-name" content="Hidden Dojo Defense" />
  <meta property="og:title" content="Hidden Dojo Defense" />
  <meta property="og:description" content="Drag ninja defenses onto glowing seals, stop rival clans, and protect Hidden Dojo." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Hidden Dojo Defense" />
  <meta name="twitter:description" content="A pixel-art ninja tower defense template for Rabbit Game Lab." />
  <meta name="theme-color" content="#132819" />
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <title>Hidden Dojo Defense</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    body { display: flex; justify-content: center; align-items: center; }
    main { width: 100%; height: 100%; }
    #game-container { width: 100%; height: 100%; }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <main aria-labelledby="game-title">
    <h1 id="game-title" class="sr-only">Hidden Dojo Defense</h1>
    <p id="game-instructions" class="sr-only">
      Tower defense game. Use Tab or arrow keys to move between controls.
      Press Enter or Space to activate a control, and Escape to cancel or pause.
    </p>
    <div id="game-container"></div>
    <div id="game-live-status" class="sr-only" role="status" aria-live="polite" aria-atomic="true"></div>
    <div id="game-live-urgent" class="sr-only" role="alert" aria-live="assertive" aria-atomic="true"></div>
  </main>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
